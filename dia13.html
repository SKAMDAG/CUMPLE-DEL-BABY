<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>13 NO cumpleaños💖</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  overflow:hidden;
  background:black;
  color:white;
}

/* escenas */
.scene{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  transition: all 0.8s ease;
  pointer-events:none;
  transform:scale(0.95);
  padding:20px;
}

/* fondo */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#1a1a40,#000);
  z-index:-1;
}

/* estrellas */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:0.8;
  animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* 🔥 TEXTO RESPONSIVE */
#intro h1{
  font-size:clamp(28px, 6vw, 42px);
}

#story{
  font-size:clamp(18px, 4.5vw, 26px);
  max-width:90%;
  line-height:1.5;
  margin:auto;
}

/* tarjeta adaptable */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}

/* pregunta */
#question{
  font-size:clamp(18px, 5vw, 24px);
  margin-bottom:15px;
}

/* botones */
button{
  margin:10px 0;
  padding:14px;
  width:100%;
  border:none;
  border-radius:14px;
  background:#4dafff;
  color:white;
  font-size:clamp(14px, 4vw, 18px);
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  background:#1a4fff;
}

/* resultado */
#result{
  font-size:clamp(16px, 4vw, 20px);
  margin-top:10px;
}

/* gráfico */
.chart{
  margin-top:15px;
  width:100%;
  height:20px;
  background:rgba(255,255,255,0.2);
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4dcdff,#ff99bb);
  border-radius:10px;
  transition:width 1s ease;
}

.percent{
  margin-top:8px;
  font-size:clamp(14px, 3.5vw, 16px);
}

/* final */
#final h1{
  font-size:clamp(26px, 6vw, 40px);
  color:#4de4ff;
  animation:glow 2s infinite alternate;
}

#finalText{
  font-size:clamp(18px, 5vw, 26px);
  max-width:90%;
  margin-top:15px;
  line-height:1.5;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #4d9aff; }
  to{ text-shadow:0 0 25px #4d94ff; }
}

/* emojis */
.float{
  position:absolute;
  bottom:-50px;
  font-size:clamp(20px,5vw,32px);
  animation:floatUp linear forwards;
}

@keyframes floatUp{
  to{
    transform:translateY(-120vh);
    opacity:0;
  }
}

</style>
</head>
<script>
const diaActual = 13;

const fechaInicio = new Date("2026-03-01");
const fechaDesbloqueo = new Date(fechaInicio);
fechaDesbloqueo.setDate(fechaInicio.getDate() + (diaActual-1));

const ahora = new Date();

if(ahora < fechaDesbloqueo){
  document.addEventListener("DOMContentLoaded", () => {
    document.body.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;text-align:center">
        <div>
          <h1>🔒 Aún no disponible</h1>
          <p>Este día todavía está bloqueado</p>
        </div>
      </div>
    `;
  });
}
</script>
<body>

<div id="bg"></div>

<div class="scene" id="intro">
  <h1>Hola mi vida...</h1>
</div>

<div class="scene" id="story">
  <div id="text"></div>
</div>

<div class="scene" id="game">
  <div class="card">
    <h2 id="question"></h2>
    <div id="options"></div>
    
    <div id="result"></div>

    <div class="chart">
      <div class="bar" id="bar"></div>
    </div>
    <div class="percent" id="percent"></div>

  </div>
</div>

<div class="scene" id="final">
  <h1> Que tengas lindo dia MI AMOR PRECIOSO.✨🩵 </h1>
  <p id="finalText"></p>
</div>

<script>

/* estrellas */
for(let i=0;i<80;i++){
  let s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'%';
  s.style.top=Math.random()*100+'%';
  s.style.animationDuration=(Math.random()*2+1)+'s';
  document.body.appendChild(s);
}

/* emojis */
const emojis=["💖","✨","💙","💜","🎈"];
setInterval(()=>{
  let e=document.createElement('div');
  e.className='float';
  e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left=Math.random()*100+'vw';
  e.style.animationDuration=(Math.random()*4+4)+'s';
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),8000);
},500);

/* transición */
function show(id){
  document.querySelectorAll('.scene').forEach(s=>{
    s.style.opacity = 0;
    s.style.pointerEvents = "none";
    s.style.transform = "scale(0.95)";
  });

  const active = document.getElementById(id);
  active.style.opacity = 1;
  active.style.pointerEvents = "auto";
  active.style.zIndex = 10;
  active.style.transform = "scale(1)";
}

/* historia */
const storyText=[
  "Feliz 13 NO cumpleaños.",
  "Esto es un pequeño recordatorio de que haces...",
  "Todo más bonito. 💫",
  "Cada día más feliz. 😊",
  "Y más especial. 💖",
  "Pero hay algo que quiero saber..."
];

let i=0;

function type(text, element, speed=40, callback){
  element.innerHTML="";
  let j=0;
  function write(){
    if(j<text.length){
      element.innerHTML+=text[j];
      j++;
      setTimeout(write,speed);
    }else if(callback){
      callback();
    }
  }
  write();
}

/* inicio */
show("intro");

setTimeout(()=>{
  show("story");
  nextStory();
},3000);

function nextStory(){
  if(i<storyText.length){
    type(storyText[i], document.getElementById('text'),40,()=>{
      setTimeout(()=>{
        i++;
        nextStory();
      },1500);
    });
  }else{
    setTimeout(()=>{
      show("game");
      loadQuestion();
    },1000);
  }
}

/* juego CONTROLADO */
let step=0;

const questions=[
  {
    q:"¿Quién crees que ama más al otro? 😏",
    options:[
      {text:"Yo 😎", match:false},
      {text:"Tú 💖", match:true}
    ],
    goodMsg:"OBVIAMENTE...",
    badMsg:"Yo sabia que ibas a decir eso. 😭💖",
    percentGood:100,
    percentBad:60
  },
  {
    q:"¿Quién piensa más en el otro? 💭",
    options:[
      {text:"Yo 😍", match:true},
      {text:"Tú 😏", match:false}
    ],
    goodMsg:"Bueno...🤨",
    badMsg:"¿Quién sabe?",
    percentGood:100,
    percentBad:50
  },
  {
    q:"¿Quién es más ñoño? 😳",
    options:[
      {text:"Yo 😀", match:false},
      {text:"Tú 🥹", match:true}
    ],
    goodMsg:"Pos si.🥹",
    badMsg:"Nahhh, yo lo soy más, lo sabes.",
    percentGood:100,
    percentBad:70
  },
  {
    q:"¿Quién es más cariñoso? 🥰",
    options:[
      {text:"Yo 🥰", match:false},
      {text:"Tú 🥹", match:true}
    ],
    goodMsg:"En verdad di eres tú.😭💖",
    badMsg:"Discutible...",
    percentGood:100,
    percentBad:65
  }
];

function loadQuestion(){
  let q=document.getElementById('question');
  let o=document.getElementById('options');
  let r=document.getElementById('result');
  let bar=document.getElementById('bar');
  let percent=document.getElementById('percent');

  q.innerHTML=questions[step].q;
  o.innerHTML="";
  r.innerHTML="";
  bar.style.width="0%";
  percent.innerHTML="";

  questions[step].options.forEach(opt=>{
    let b=document.createElement('button');
    b.innerText=opt.text;
    b.onclick=()=>answer(opt);
    o.appendChild(b);
  });
}

function answer(opt){
  let qData = questions[step];
  let r=document.getElementById('result');
  let bar=document.getElementById('bar');
  let percent=document.getElementById('percent');

  let value = opt.match ? qData.percentGood : qData.percentBad;

  r.innerHTML = opt.match ? qData.goodMsg : qData.badMsg;

  setTimeout(()=>{
    bar.style.width = value + "%";
    percent.innerHTML = value + "% compatibilidad 💖";
  },200);

  setTimeout(()=>{
    step++;
    if(step<questions.length){
      loadQuestion();
    }else{
      showFinal();
    }
  },2000);
}


/* final + redirección */
function showFinal(){
  show("final");

  type("✨🩵TE AMO MUCHO SWEETHEART.✨🩵",
  document.getElementById('finalText'),40, ()=>{
    
    // ⏳ espera 5 segundos y va a index
    setTimeout(()=>{
      window.location.href = "index.html";
    },5000);

  });
}
</script>

</body>
</html>
