<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>💙 Mi App</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#cfe9ff,#eaf6ff);
  display:flex;
  justify-content:center;
}

/* 📱 CONTENEDOR APP */
.app-container{
  width:100%;
  max-width:420px;
  min-height:100vh;
  padding:20px 15px;
  position:relative;
}

/* 🌟 PARTICULAS */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

.star{
  position:absolute;
  top:-20px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg); }
}

.star:nth-child(3n){
  animation: fall linear infinite, blink 2s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}

/* TITULO */
h2{
  text-align:center;
  color:#1e3a8a;
  margin-bottom:25px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
}

/* TARJETAS */
.card{
  background: rgba(184,215,245,0.5);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:18px 5px;
  text-align:center;
  transition:0.3s;
  cursor:pointer;
  position:relative;
}

/* HOVER / TAP */
.card:active{
  transform:scale(0.95);
}

/* DESBLOQUEADO */
.active{
  background:#9dc4f7;
  color:white;
  animation:pop 0.4s ease;
}

/* ANIMACIÓN DESBLOQUEO */
@keyframes pop{
  0%{transform:scale(0.5);}
  100%{transform:scale(1);}
}

/* BLOQUEADO */
.locked{
  opacity:0.5;
}

/* TEXTO */
.icon{
  font-size:22px;
}

.day{
  font-size:13px;
  font-weight:bold;
}

.timer{
  font-size:10px;
}

/* 💥 EFECTO DESBLOQUEO */
.card.active::after{
  content:"✨";
  position:absolute;
  top:-10px;
  right:-5px;
  animation:spark 1s infinite;
}

@keyframes spark{
  0%{transform:scale(0);}
  50%{transform:scale(1.2);}
  100%{transform:scale(0);}
}

/* 💻 MODO PC */
@media (min-width:900px){

  .app-container{
    max-width:900px;
  }

  .grid{
    grid-template-columns: repeat(5,1fr);
  }

}


</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="app-container">

<h2>💙 Cuenta Regresiva</h2>

<div class="grid" id="grid"></div>

</div>

<script>
// 🌟 PARTICULAS
const starsContainer = document.getElementById("stars");
const elementos = ["💙","✨","⭐"];

for(let i=0;i<40;i++){
  const star = document.createElement("div");
  star.classList.add("star");

  star.innerText = elementos[Math.floor(Math.random()*elementos.length)];
  star.style.left = Math.random()*100+"%";
  star.style.animationDuration = (4 + Math.random()*6)+"s";
  star.style.fontSize = (10 + Math.random()*12)+"px";

  starsContainer.appendChild(star);
}

// 📅 CONFIG
const totalDias = 30;
const fechaInicio = new Date(2026,2,1);
fechaInicio.setHours(0,0,0,0);

const grid = document.getElementById("grid");

for(let i=1;i<=totalDias;i++){

  const card = document.createElement("div");
  card.classList.add("card");

  const fecha = new Date(fechaInicio);
  fecha.setDate(fechaInicio.getDate()+(i-1));
  fecha.setHours(0,0,0,0);

  const icon = document.createElement("div");
  icon.classList.add("icon");

  const day = document.createElement("div");
  day.classList.add("day");
  day.innerText = "Día " + i;

  const timer = document.createElement("div");
  timer.classList.add("timer");

  const ahora = new Date();

  if(ahora >= fecha){
    icon.innerText = "🔓";
    timer.innerText = "Disponible";
    card.classList.add("active");

    card.onclick = () => {
      if(i === 30){
        window.location.href = "cumpleanos.html";
      }else{
        window.location.href = "dia"+i+".html";
      }
    };

  }else{
    icon.innerText = "🔒";
    card.classList.add("locked");

    function actualizarTimer(){
      const ahora = new Date();
      const diff = fecha - ahora;

      if(diff <= 0){
        location.reload();
        return;
      }

      const d = Math.floor(diff/(1000*60*60*24));
      const h = Math.floor((diff/(1000*60*60))%24);
      const m = Math.floor((diff/(1000*60))%60);
      const s = Math.floor((diff/1000)%60);

      timer.innerText = `${d}d ${h}h ${m}m ${s}s`;
    }

    actualizarTimer();
    setInterval(actualizarTimer, 1000);
  }

  card.appendChild(icon);
  card.appendChild(day);
  card.appendChild(timer);

  grid.appendChild(card);
}
</script>

</body>
</html>
