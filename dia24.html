```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>24 NO Cumpleaños 🥳</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Comic Sans MS';
  background:linear-gradient(135deg,#fff0f6,#eaf6ff);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* PORTADA */
.portada{
  width:400px;
  height:600px;
  background:#fff;
  border-radius:20px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  padding:20px;
  cursor:pointer;
  text-align:center;
}

.titulo{
  font-size:2em;
  color:#ff8fcf;
  margin-bottom:20px;
}

.imagen{
  width:140px;
  margin:20px auto;
  display:block;
  border-radius:15px;
  transform:rotate(-3deg);
}

.etiqueta{
  background:#ffe4f0;
  padding:10px;
  border-radius:10px;
  display:inline-block;
}

/* INTERIOR */
#paginaInterior{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(8px);
  justify-content:center;
  align-items:center;
}

/* SCRAPBOOK */
.scrapbook{
  width:700px;
  height:500px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  position:relative;
  cursor:pointer;
}

/* PAGINAS */
.paginas{
  display:flex;
  height:100%;
  transition:transform .6s ease;
}

.pagina{
  min-width:100%;
  padding:30px;
  background:#fffafc;
  position:relative;
}

/* DECORACION SCRAPBOOK */
.sticker{
  position:absolute;
  width:70px;
  transform:rotate(-10deg);
}

.sticker2{
  position:absolute;
  width:70px;
  transform:rotate(8deg);
}

/* TEXTO */
h2{
  color:#ff8fcf;
  margin-bottom:10px;
}

p{
  color:#555;
}

/* CERRAR */
.cerrar{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
}
</style>
</head>

<body>

<div class="portada" onclick="abrir()">
  <div class="titulo">Para ti 💖</div>
  <img src="1.png" class="imagen">
  <div class="etiqueta">24 NO Cumpleaños</div>
</div>

<div id="paginaInterior">

<div class="scrapbook" onclick="siguiente()">

<div class="paginas" id="paginas">

<!-- PAGINA 1 -->
<div class="pagina">
<h2>Hola Muñeco ✧</h2>
<p>Para mí es muy importante sentirme amada...</p>

<img src="11.png" class="sticker" style="top:20px; right:30px;">
<img src="3.png" class="sticker2" style="bottom:20px; left:20px;">
</div>

<!-- PAGINA 2 -->
<div class="pagina">
<h2>Feliz 24 ✧</h2>
<p>Como ama las cosas pequeñas...</p>

<img src="pingui.png" class="sticker" style="top:30px; left:40px;">
<img src="coneji.png" class="sticker2" style="bottom:20px; right:30px;">
</div>

<!-- PAGINA 3 -->
<div class="pagina">
<h2>💖</h2>
<p>Eres de las cosas más bonitas de mi vida...</p>
</div>

</div>

<div class="cerrar" onclick="cerrar(event)">✕</div>

</div>
</div>

<script>
let pagina=0;
const contenedor=document.getElementById("paginas");

function abrir(){
  document.getElementById("paginaInterior").style.display="flex";
}

function cerrar(e){
  e.stopPropagation();
  document.getElementById("paginaInterior").style.display="none";
}

function siguiente(){
  if(pagina < contenedor.children.length-1){
    pagina++;
  }else{
    pagina=0; // vuelve al inicio
  }

  contenedor.style.transform = "translateX(-"+(pagina*100)+"%)";
}
</script>

</body>
</html>
```
