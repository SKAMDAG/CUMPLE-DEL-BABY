<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 10mo NO cumpleaños 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* CONTENEDOR */
#wrapper{
  position:relative;
  width:90vw;
  height:90vh;
}

/* IMAGEN */
#fondo{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;
}

/* CAPA */
#cielo{
  position:absolute;
  width:100%;
  height:100%;
}

/* ⭐ ESTRELLAS */
.estrella{
  position:absolute;
  font-size:22px;
  cursor:pointer;
  user-select:none;
  animation:brillar 2s infinite ease-in-out, flotar 3s infinite ease-in-out;
}

/* SOLO ESTRELLAS (no luna) */
.estrella:not(.luna)::before{ content:"✨"; }
.estrella:not(.luna):nth-child(2n)::before{ content:"⭐"; }
.estrella:not(.luna):nth-child(3n)::before{ content:"💫"; }

/* 🌙 LUNA */
.luna{
  font-size:30px;
  animation:flotar 3s infinite ease-in-out, brilloLuna 2.5s infinite ease-in-out;
}

.luna::before{
  content:"🌙";
}

@keyframes brilloLuna{
  0%,100%{
    opacity:0.8;
    transform:scale(1);
    text-shadow:0 0 8px #fff;
  }
  50%{
    opacity:1;
    transform:scale(1.4);
    text-shadow:0 0 25px #8ab4ff, 0 0 40px white;
  }
}

.luna:hover{
  transform:scale(1.9);
}

/* ANIMACIONES */
@keyframes brillar{
  0%,100%{opacity:0.6; transform:scale(1);}
  50%{opacity:1; transform:scale(1.4);}
}

@keyframes flotar{
  0%{ transform:translateY(0);}
  50%{ transform:translateY(-6px);}
  100%{ transform:translateY(0);}
}
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translate(-50%, -30%) scale(0.8);
  }
  to{
    opacity:1;
    transform:translate(-50%, -50%) scale(1);
  }
}
/* MENSAJE */
.mensaje{
  position:fixed; /* 👈 mejor que absolute */
  max-width:80%;
  background:rgba(0,0,0,0.75);
  color:white;
  padding:12px 16px;
  border-radius:15px;
  font-family:'Dancing Script', cursive;
  font-size:clamp(16px, 4vw, 20px); /* 👈 responsive */
  text-align:center;
  pointer-events:none;
  z-index:999;

  /* 👇 efecto bonito */
  animation:fadeUp 0.3s ease;
}

/* CARTA */
.carta{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:rgba(0,0,0,0.7);
  padding:25px;
  border-radius:20px;
  color:white;
  text-align:center;
  font-family:'Dancing Script', cursive;
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="wrapper">

  <img id="fondo" src="estrella3.jpg">

  <div id="cielo">

    <div class="estrella" style="top:15%; left:25%;" onclick="clickEstrella(event)"></div>
    <div class="estrella" style="top:20%; left:70%;" onclick="clickEstrella(event)"></div>
    <div class="estrella" style="top:35%; left:50%;" onclick="clickEstrella(event)"></div>
    <div class="estrella" style="top:55%; left:20%;" onclick="clickEstrella(event)"></div>
    <div class="estrella" style="top:60%; left:75%;" onclick="clickEstrella(event)"></div>

    <!-- 🌙 LUNA FINAL -->
    <div class="estrella luna" style="top:75%; left:52%;" onclick="mostrarCarta()"></div>

  </div>

</div>

<script>
let frases = [
  "Eres mi persona favorita en el mundo. 💙",
  "Me haces muy feliz. ✨",
  "Siempre pienso en ti y a veces me quillo por eso.😂🌙",
  "También eres mi sonrisa favorita.💫",
  "Contigo todo es más bonitoooooooo. 💕",
  "¿Cómo es que puedes ser TANNNNN lindo?"
];

function clickEstrella(e){
  if(frases.length === 0) return;

  const i = Math.floor(Math.random()*frases.length);
  const texto = frases.splice(i,1)[0];

  const msg = document.createElement("div");
  msg.className="mensaje";
  msg.innerText=texto;

const x = e.clientX;
const y = e.clientY;

msg.style.left = x + "px";
msg.style.top = y + "px";
msg.style.transform = "translate(-50%, -50%)"; // 👈 centra

  document.body.appendChild(msg);
  setTimeout(()=>msg.remove(),3000);
}

function mostrarCarta(){
  const carta=document.createElement("div");
  carta.className="carta";

  carta.innerHTML=`
    FELIZ 10 NO CUMPLEAÑOS MUÑECO.💖<br><br>
    Eres de las cosas màs bonitas que <br>
    me han pasado, te lo he dicho antes,<br>
    espero siempre poder llamarte amor,<br>
    que siempre cuentes conmigo y que seamos<br>
    locos, raritos y todo lo que sea que seamos,<br>
    pero que lo seamos juntos pa' forever.✨<br><br>
    <small>Te AMOOOOOOOOO muchísimo. 💙</small>
  `;

  carta.onclick=()=> window.location.href="index.html";

  document.body.appendChild(carta);
}
const margen = 20;

let posX = Math.min(window.innerWidth - margen, Math.max(margen, e.clientX));
let posY = Math.min(window.innerHeight - margen, Math.max(margen, e.clientY));

msg.style.left = posX + "px";
msg.style.top = posY + "px";
msg.style.transform = "translate(-50%, -50%)";
</script>

</body>
</html>
