<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Para Ti 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* 🔥 CONTENEDOR CON TAMAÑO REAL */
#wrapper{
  position:relative;
  width:90vw;
  height:90vh;
}

/* IMAGEN */
#fondo{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain; /* mantiene proporción */
}

/* CAPA */
#cielo{
  position:absolute;
  width:100%;
  height:100%;
}

/* ⭐ ESTRELLAS */
.estrella{
  position:absolute;
  font-size:22px;
  cursor:pointer;

  animation:brillar 2s infinite ease-in-out, flotar 3s infinite ease-in-out;
}

.estrella::before{ content:"✨"; }
.estrella:nth-child(2n)::before{ content:"⭐"; }
.estrella:nth-child(3n)::before{ content:"💫"; }

@keyframes brillar{
  0%,100%{opacity:0.6; transform:scale(1);}
  50%{opacity:1; transform:scale(1.4);}
}

@keyframes flotar{
  0%{ transform:translateY(0);}
  50%{ transform:translateY(-6px);}
  100%{ transform:translateY(0);}
}

/* MENSAJE */
.mensaje{
  position:absolute;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:12px;
  border-radius:15px;
  font-family:'Dancing Script', cursive;
  font-size:20px;
}

/* CARTA */
.carta{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  background:rgba(0,0,0,0.7);
  padding:25px;
  border-radius:20px;
  color:white;
  text-align:center;
  font-family:'Dancing Script', cursive;
  font-size:22px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="wrapper">

  <img id="fondo" src="estrella3.jpg">

  <div id="cielo">

    <!-- ⭐ YA NO SE AGRUPAN -->
    <div class="estrella" style="top:15%; left:25%;" onclick="clickEstrella(event)"></div>
    <div class="estrella" style="top:20%; left:70%;" onclick="clickEstrella(event)"></div>
    <div class="estrella" style="top:35%; left:50%;" onclick="clickEstrella(event)"></div>
    <div class="estrella" style="top:55%; left:20%;" onclick="clickEstrella(event)"></div>
    <div class="estrella" style="top:60%; left:75%;" onclick="clickEstrella(event)"></div>

    <!-- 💌 FINAL -->
    <div class="estrella" style="top:80%; left:50%;" onclick="mostrarCarta()"></div>

  </div>

</div>

<script>
let frases = [
  "Eres mi lugar favorito 💙",
  "Me haces muy feliz ✨",
  "Siempre pienso en ti 🌙",
  "Eres mi persona favorita 💫",
  "Contigo todo es mejor 💕"
];

function clickEstrella(e){
  if(frases.length === 0) return;

  const i = Math.floor(Math.random()*frases.length);
  const texto = frases.splice(i,1)[0];

  const msg = document.createElement("div");
  msg.className="mensaje";
  msg.innerText=texto;

  msg.style.top=e.clientY+"px";
  msg.style.left=e.clientX+"px";

  document.body.appendChild(msg);
  setTimeout(()=>msg.remove(),3000);
}

function mostrarCarta(){
  const carta=document.createElement("div");
  carta.className="carta";

  carta.innerHTML=`
    💖 Para ti 💖<br><br>
    Eres lo mejor que me ha pasado ✨<br><br>
    Te quiero muchísimo 💙<br><br>
    <small>(toca aquí)</small>
  `;

  carta.onclick=()=> window.location.href="index.html";

  document.body.appendChild(carta);
}
</script>

</body>
</html>
