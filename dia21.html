<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>21 NO Cumpleaños💙</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(#cceeff, #b074b8);
      min-height: 100vh;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 { color: #66adff; margin-top: 20px; }

    #words {
      width: 260px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      color: #080808;
      font-size: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .word-item {
      padding: 4px 6px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .word-item.done {
      text-decoration: line-through;
      color: #bbb;
      background: rgba(255,255,255,0.5);
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(14, 30px);
      gap: 5px;
      justify-content: center;
      user-select: none;
    }

    .cell {
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      color: #66dbff;
    }

    .selected { background: #f3bbf5d0; }
    .found { background: #477499; color: white; }

    /* CONTENEDOR BIEN CENTRADO */
    .game-container{
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      padding: 30px;
      flex-wrap: wrap;
      max-width: 900px;
      width: 100%;
    }

    /* 💖 PANTALLA FINAL */
    .final-screen{
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100vh;
      background: linear-gradient(135deg,#d6ecff,#ffe6f0);
      display:flex;
      justify-content:center;
      align-items:center;
      opacity:0;
      pointer-events:none;
      transition:0.6s ease;
      z-index:999;
    }

    .final-screen.show{
      opacity:1;
      pointer-events:auto;
    }

    /* TARJETA */
    .final-card{
      background:white;
      padding:30px;
      border-radius:25px;
      max-width:350px;
      width:90%;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      animation:pop 0.6s ease;
    }

    @keyframes pop{
      from{transform:scale(0.8); opacity:0;}
      to{transform:scale(1); opacity:1;}
    }

    .final-card h2{
      color:#66adff;
      margin-bottom:15px;
    }

    .final-card p{
      font-size:15px;
      line-height:1.6;
      color:#444;
    }

    /* 💙 BOTÓN BONITO (no robótico) */
    .final-card button{
      margin-top:15px;
      padding:10px 18px;
      border:none;
      border-radius:20px;
      background:linear-gradient(45deg,#66b3ff,#99ccff);
      color:white;
      font-size:14px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    .final-card button:hover{
      transform:scale(1.1);
    }

    /* 📱 CELULAR */
    @media (max-width: 768px){

      #grid{
        grid-template-columns: repeat(14, 22px);
        gap: 4px;
      }

      .cell{
        width: 22px;
        height: 22px;
        font-size: 12px;
      }

      #words{
        width: 90%;
      }

      h1{
        font-size:20px;
        padding:0 10px;
      }
    }

  </style>
</head>

<body>

<h1>Holis, encuentra las palabras.💙</h1>

<div class="game-container">
  <div id="grid"></div>
  <div id="words"></div>
</div>

<!-- 💖 FINAL -->
<div id="finalScreen" class="final-screen">
  <div class="final-card">
    <h2>Feliz 21 NO cumpleaños amor.</h2>
    <p id="finalText"></p>
    <button onclick="irAIndex()">LOVIUUUUU.</button>
  </div>
</div>

<script>
// 👉 Personaliza el nombre aquí
const nombre = "MI AMOR";

const words = [
  "MUÑECO","NOCUMPLEAÑOS","BABY","AZUL","NIÑO","NOVIO","LINDO","AMOR","GUAPISIMO","ASTRIPERCITO"
];

// Mostrar palabras
const wordsContainer = document.getElementById('words');
wordsContainer.innerHTML = words.map(w => `<div class="word-item" data-word="${w}">🩵 ${w}</div>`).join('');

const gridSize = 14;
let grid = Array.from({ length: gridSize }, () => Array(gridSize).fill(''));

const directions = [[0,1],[1,0],[1,1],[-1,1]];

function placeWord(word) {
  let placed = false;
  while (!placed) {
    const dir = directions[Math.floor(Math.random()*directions.length)];
    let row = Math.floor(Math.random()*gridSize);
    let col = Math.floor(Math.random()*gridSize);

    let canPlace = true;
    for (let i=0;i<word.length;i++){
      let r = row + dir[0]*i;
      let c = col + dir[1]*i;
      if(r<0||c<0||r>=gridSize||c>=gridSize||grid[r][c]!==""){
        canPlace=false; break;
      }
    }

    if(canPlace){
      for (let i=0;i<word.length;i++){
        let r = row + dir[0]*i;
        let c = col + dir[1]*i;
        grid[r][c] = word[i];
      }
      placed=true;
    }
  }
}

words.forEach(placeWord);

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
for(let i=0;i<gridSize;i++){
  for(let j=0;j<gridSize;j++){
    if(grid[i][j]==="") grid[i][j]=letters[Math.floor(Math.random()*letters.length)];
  }
}

const gridContainer = document.getElementById('grid');
let cells = [];

for(let i=0;i<gridSize;i++){
  for(let j=0;j<gridSize;j++){
    const div = document.createElement('div');
    div.classList.add('cell');
    div.textContent = grid[i][j];
    gridContainer.appendChild(div);
    cells.push(div);
  }
}

let isDragging=false;
let selectedCells=[];
let current="";
let found=[];

function reset(){
  current="";
  selectedCells.forEach(c=>c.classList.remove('selected'));
  selectedCells=[];
}

cells.forEach(cell=>{
  cell.addEventListener('mousedown',()=>{
    isDragging=true; reset();
    addCell(cell);
  });

  cell.addEventListener('mouseover',()=>{
    if(isDragging) addCell(cell);
  });

  cell.addEventListener('mouseup',()=>{
    isDragging=false;
    checkWord();
  });
});

document.addEventListener('mouseup',()=> isDragging=false);

function addCell(cell){
  if(!selectedCells.includes(cell)){
    cell.classList.add('selected');
    selectedCells.push(cell);
    current += cell.textContent;
  }
}

function checkWord(){
  words.forEach(word=>{
    if(current===word && !found.includes(word)){
      const item = document.querySelector(`[data-word="${word}"]`);
      if(item) item.classList.add('done');
      found.push(word);

      selectedCells.forEach(c=>{
        c.classList.remove('selected');
        c.classList.add('found');
      });

      if(found.length===words.length){
        showMessage();
      }
    }
  });
  reset();
}

function showMessage(){
  const msg = "Hola mi amor, iba a decir que ya me esta saturando la cursileria pero el diseño de hoy está muy lindo para estar diciendo esas cosas, asi que bueno, solo queda decir que...No pienso romperte el corazón, pero la paciencia si, pero no te preocupes, respiras un poquitito y se te pasa.🥹😇";

  const screen = document.getElementById("finalScreen");
  const text = document.getElementById("finalText");

  screen.classList.add("show");
  text.innerHTML = "";

  let i=0;
  function type(){
    if(i<msg.length){
      text.innerHTML += msg[i];
      i++;
      setTimeout(type,30);
    }
  }
  type();
}

function irAIndex(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
