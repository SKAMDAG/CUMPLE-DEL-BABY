<style>
body {
font-family: 'Arial', sans-serif;
margin: 0;
padding: 0;
overflow-x: hidden;

/* Fondo animado */
background: linear-gradient(-45deg, #ffdde1, #ee9ca7, #c2e9fb, #a1c4fd);
background-size: 400% 400%;
animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

.screen {
display: none;
justify-content: center;
align-items: center;
height: 100vh;
text-align: center;
flex-direction: column;
}

.active {
display: flex;
}

/* TECLADO */
.keypad {
display: grid;
grid-template-columns: repeat(3, 70px);
gap: 12px;
margin-top: 20px;
}

.key {
background: linear-gradient(145deg, #ffffff, #e6e6e6);
border: none;
border-radius: 15px;
font-size: 20px;
padding: 15px;
cursor: pointer;
box-shadow: 5px 5px 10px #bebebe, -5px -5px 10px #ffffff;
transition: 0.2s;
}

.key:active {
box-shadow: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff;
}

.input-display {
font-size: 28px;
margin-top: 20px;
letter-spacing: 10px;
color: #333;
}

/* CARTA */
.notepad {
background: rgba(255, 255, 255, 0.2);
backdrop-filter: blur(15px);
border-radius: 20px;
padding: 25px;
width: 90%;
max-width: 500px;
color: #333;
box-shadow: 0 8px 30px rgba(0,0,0,0.2);
border: 1px solid rgba(255,255,255,0.3);
animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.btn-container {
display: flex;
justify-content: space-between;
margin-top: 15px;
}

/* BOTONES */
.btn {
background: linear-gradient(45deg, #ff758c, #ff7eb3);
border: none;
padding: 10px 20px;
font-size: 16px;
border-radius: 20px;
color: white;
cursor: pointer;
transition: 0.3s;
}

.btn:hover {
transform: scale(1.1);
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* IMÁGENES */
.img-page img {
width: 100%;
max-width: 400px;
border-radius: 15px;
}

/* CARRUSEL */
.carousel {
position: relative;
width: 90%;
max-width: 500px;
margin: 20px auto;
overflow: hidden;
border-radius: 15px;
}

.carousel-track {
display: flex;
transition: transform 0.6s ease-in-out;
}

.carousel-track img {
width: 100%;
flex-shrink: 0;
border-radius: 15px;
transition: transform 0.4s;
}

.carousel-track img:hover {
transform: scale(1.05);
}

.carousel-btn {
position: absolute;
top: 50%;
transform: translateY(-50%);
background: rgba(0,0,0,0.5);
color: white;
border: none;
font-size: 1.5em;
cursor: pointer;
padding: 8px 12px;
border-radius: 50%;
}

.carousel-btn.prev { left: 10px; }
.carousel-btn.next { right: 10px; }

/* CORAZONES */
@keyframes floatUp {
0% { transform: translateY(0); opacity: 1; }
100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<script>
const correctPassword = '0110';
let input = '';

function enterDigit(digit){
if(input.length < 4){
input += digit;
updateDisplay();
}
}

function deleteLast(){
input = input.slice(0,-1);
updateDisplay();
}

function updateDisplay(){
document.getElementById('inputDisplay').textContent = input.padEnd(4,'•');
}

function checkPassword(){
if(input === correctPassword){
document.getElementById('passwordScreen').classList.remove('active');
document.getElementById('notepadScreen').classList.add('active');
showPage(1);
}else{
alert('Contraseña incorrecta');
input='';
updateDisplay();
}
}

function goBack(){
document.getElementById('notepadScreen').classList.remove('active');
document.getElementById('passwordScreen').classList.add('active');
input='';
updateDisplay();
}

function showPage(n){
document.querySelectorAll('.notepad').forEach(p=>p.style.display='none');
document.getElementById('page'+n).style.display='block';
}

function nextPage(n){ showPage(n); }
function prevPage(n){ showPage(n); }

/* CARRUSEL */
let currentSlide = 0;
function moveSlide(direction){
const track = document.getElementById('carouselTrack');
const total = track.children.length;

currentSlide += direction;

if(currentSlide < 0) currentSlide = total-1;
if(currentSlide >= total) currentSlide = 0;

track.style.transform = `translateX(-${currentSlide*100}%)`;
}
