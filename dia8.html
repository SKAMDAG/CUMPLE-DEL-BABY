<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8vo NO cumpleaños.💗</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" 
rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial;
background:#000;
}

/* 🎥 VIDEO */
#envelope{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:contain;
background:#f3e9e3;
z-index:1;
cursor:pointer;
transition:0.5s;
}

/* OSCURO */
.overlay-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(184, 248, 248, 0.342);
z-index:2;
pointer-events:none;
}

/* TEXTO INICIO */
.overlay{
position:relative;
z-index:3;
height:100vh;
display:flex;
flex-direction:column;
justify-content:first baseline ;
align-items:CENTER;
font-family:'Dancing Script', cursive;
color:white;
text-shadow:0 0 10px black;
pointer-events:none;
}

.arrow-text{
font-size:2em;
}

.arrow{
font-size:3em;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
0%{transform:translateY(0);}
100%{transform:translateY(10px);}
}

/* 💌 CARTA */
.letter{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:10px;
z-index:999;
font-family:'Dancing Script', cursive;
font-size:1.3em;
width:90%;
max-width:500px;
cursor:pointer;
transition:0.4s;
}

/* 💖 CORAZONES */
.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* 💬 MENSAJE FINAL */
.final-msg{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 40px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
font-family:'Dancing Script', cursive;
font-size:1.5em;
z-index:1000;
display:none;
}


</style>
</head>
<script>
const diaActual = 8;

const fechaInicio = new Date("2026-03-01");
const fechaDesbloqueo = new Date(fechaInicio);
fechaDesbloqueo.setDate(fechaInicio.getDate() + (diaActual-1));

  document.addEventListener("DOMContentLoaded", () => {
    document.body.innerHTML = `
      <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;text-align:center">
        <div>
          <h1>🔒 Aún no disponible</h1>
          <p>Este día todavía está bloqueado</p>
        </div>
      </div>
    `;
  });

</script>
<body>

<!-- VIDEO -->
<video id="envelope" autoplay muted loop playsinline onclick="openEnvelope()">
<source src="vidiio.mp4" type="video/mp4">
</video>

<div class="overlay-bg"></div>

<div class="overlay" id="overlay">
<div class="arrow"> HI BABY!✨ </div>
</div>

<!-- CARTA -->
<div class="letter" id="letter" onclick="cerrarCarta()">
<p id="texto"></p>
</div>

<!-- MENSAJE -->
<div class="final-msg" id="finalMsg">Es todo por hoy, see you soon.❤️ </div>

<!-- FONDO FINAL -->
<div class="final-bg" id="finalBg"></div>

<script>

const mensaje = `Feliz 8 NO cumpleaños muchachito mío.<br><br>

Eres lo más bonito que me ha pasado, por ahora...JAJAJA.❤️<br>
En verdad hoy no tengo tantas cosas para decir, pero espero
que te estés sintiendo muy feliz y amado en cada uno de tus NO cumpleaños,
aún faltan unos cuantos.<br>Te amo tantísimo, byecito.<br><br>

BTW: La canción de hoy es bien cool.<3`;

let heartsInterval;

/* ABRIR */
function openEnvelope(){
const video = document.getElementById("envelope");
const letter = document.getElementById("letter");
const overlay = document.getElementById("overlay");

/* ocultar overlay */
overlay.style.display="none";

video.style.opacity="0";

setTimeout(()=>{
video.style.display="none";
letter.style.display="block";
escribir();
corazones();
},500);
}

function escribir(){
let target = document.getElementById("texto");
target.innerHTML = "";

let i = 0;

function escribirLetra(){
if(i < mensaje.length){

if(mensaje.substring(i, i+4) === "<br>"){
target.innerHTML += "<br>";
i += 4;
}else{
target.innerHTML += mensaje.charAt(i);
i++;
}

setTimeout(escribirLetra, 40);
}
}

escribirLetra();
}

/* CORAZONES */
function corazones(){
heartsInterval = setInterval(()=>{
let heart = document.createElement("div");

heart.className = "heart";

const elementos = ["🩵","🥳"];
heart.innerHTML = elementos[Math.floor(Math.random() * elementos.length)];

heart.style.left = Math.random()*100 + "vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
},300);
}

/* CERRAR */
function cerrarCarta(){

const letter = document.getElementById("letter");
const msg = document.getElementById("finalMsg");
const finalBg = document.getElementById("finalBg");
const video = document.getElementById("envelope");
const overlay = document.getElementById("overlay");

/* parar corazones */
clearInterval(heartsInterval);

/* ocultar carta */
letter.style.opacity="0";

setTimeout(()=>{
letter.style.display="none";


/* mensaje */
msg.style.display="block";

},400);

/* volver al inicio */
setTimeout(()=>{
    window.location.href = "index.html";
}, 3000);

}


</script>

</body>
</html>
