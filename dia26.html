<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>26 NO Cumpleaños</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  canvas.webgl {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
    cursor: grab;
  }
  canvas.webgl:active { cursor: grabbing; }

  .title {
    position: fixed; top: 25px; left: 50%;
    transform: translateX(-50%);
    text-align: center; z-index: 10;
    pointer-events: none;
    text-shadow: 0 0 20px #0e0820, 0 0 40px #6a59b3;
  }
  .title h1 {
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 200; letter-spacing: 8px;
    background: linear-gradient(90deg,#ff90ff,#fff,#4f8cff,#ff90ff);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 5s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.5)} }
  .title p { margin-top: 8px; letter-spacing: 4px; opacity: 0.85; font-size: 0.8rem;}

  .hint {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-size: 0.85rem;
    letter-spacing: 2px; z-index: 10; pointer-events: none;
    text-shadow: 0 0 10px rgba(255,105,180,0.6);
  }

  /* CARD memoria */
  #card {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.7);
    width: 340px; max-width: 90vw;
    background: rgba(20,0,40,0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,144,255,0.4);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,105,180,0.6), 0 0 120px rgba(79,140,255,0.3);
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s ease, transform .4s cubic-bezier(.2,.9,.3,1.4);
    z-index: 100;
  }
  #card.active {
    opacity: 1;
    transform: translate(-50%,-50%) scale(1);
    pointer-events: auto;
  }
  #card img {
    width: 100%; height: 200px;
    object-fit: cover;
    border-radius: 14px;
    margin-bottom: 14px;
    background: #2a0845;
  }
  #card h2 {
    font-size: 1.4rem; font-weight: 300;
    margin-bottom: 8px; letter-spacing: 2px;
    color: #ffb6e6;
    text-shadow: 0 0 10px #ff69b4;
  }
  #card p {
    font-size: 1rem; color: #f0e0ff;
    line-height: 1.5; margin-bottom: 18px;
  }
  #card button {
    background: linear-gradient(90deg,#ff90ff,#4f8cff);
    color: #fff; border: none;
    padding: 10px 22px; border-radius: 30px;
    cursor: pointer; font-size: 0.9rem;
    letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(255,105,180,0.5);
    transition: transform .2s;
  }
  #card button:hover { transform: scale(1.05); }

  .floating-heart {
    position: fixed; pointer-events: none;
    font-size: 1.5rem;
    animation: floatUp linear forwards;
    z-index: 200;
  }
  @keyframes floatUp { to { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }

  /* Mensaje final */
  .final-msg {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0.8);
    color: #fff;
    background: rgba(255,20,147,0.3);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,182,193,0.6);
    padding: 30px 40px;
    border-radius: 30px;
    font-size: 1.4rem;
    text-align: center;
    max-width: 85vw;
    opacity: 0;
    pointer-events: none;
    z-index: 300;
    text-shadow: 0 0 20px #ff69b4;
    transition: opacity .8s ease, transform .8s ease;
    letter-spacing: 2px;
  }
  .final-msg.show {
    opacity: 1;
    transform: translate(-50%,-50%) scale(1);
  }
</style>
</head>
<body>

<div class="title">
  <h1>FELIZ 26 NO CUMPLEAÑOS</h1>
  <p>✦ LOVIUU MUCHACHITO.✦</p>
</div>

<canvas class="webgl"></canvas>

<div id="card">
  <img id="img" src="" alt="">
  <h2 id="title-card"></h2>
  <p id="text"></p>
  <button onclick="closeCard()">✨💜</button>
</div>

<div class="final-msg" id="finalMsg"></div>
<div class="hint"> Hasta la proxima señorito. </div>

<script type="module">
import * as THREE from "https://cdn.skypack.dev/three@0.132.2";
import { OrbitControls } from "https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js";

const canvas = document.querySelector('canvas.webgl');
const scene = new THREE.Scene();

/* ====== ESTRELLAS DE FONDO ====== */
const bgStarsGeo = new THREE.BufferGeometry();
const bgCount = 1500;
const bgPos = new Float32Array(bgCount * 3);
for (let i = 0; i < bgCount; i++) {
  bgPos[i*3]   = (Math.random()-0.5)*60;
  bgPos[i*3+1] = (Math.random()-0.5)*60;
  bgPos[i*3+2] = (Math.random()-0.5)*60;
}
bgStarsGeo.setAttribute('position', new THREE.BufferAttribute(bgPos,3));
const bgStars = new THREE.Points(bgStarsGeo, new THREE.PointsMaterial({
  size: 0.04, color: 0xffffff, transparent:true, opacity:0.7, sizeAttenuation:true
}));
scene.add(bgStars);

/* ====== GALAXIA ESPIRAL ====== */
const parameters = {
  count: 60000,
  size: 0.015,
  radius: 5,
  branches: 4,
  spin: 2,
  randomness: 0.3,
  randomnessPower: 3,
  insideColor: '#ff90ff',
  outsideColor: '#4f8cff'
};

const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(parameters.count * 3);
const colors = new Float32Array(parameters.count * 3);

const colorInside = new THREE.Color(parameters.insideColor);
const colorOutside = new THREE.Color(parameters.outsideColor);

for(let i=0; i<parameters.count; i++){
  const i3 = i*3;
  const radius = Math.random()*parameters.radius;
  const spinAngle = radius*parameters.spin;
  const branchAngle = (i%parameters.branches)/parameters.branches*Math.PI*2;

  // Aleatoriedad para que los brazos tengan grosor
  const randomX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random()<0.5?1:-1) * parameters.randomness * radius;
  const randomY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random()<0.5?1:-1) * parameters.randomness * radius * 0.4;
  const randomZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random()<0.5?1:-1) * parameters.randomness * radius;

  positions[i3]   = Math.cos(branchAngle+spinAngle)*radius + randomX;
  positions[i3+1] = randomY;
  positions[i3+2] = Math.sin(branchAngle+spinAngle)*radius + randomZ;

  const mixedColor = colorInside.clone();
  mixedColor.lerp(colorOutside, radius/parameters.radius);
  colors[i3]   = mixedColor.r;
  colors[i3+1] = mixedColor.g;
  colors[i3+2] = mixedColor.b;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors,3));

const material = new THREE.PointsMaterial({
  size: parameters.size,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  sizeAttenuation: true
});

const galaxy = new THREE.Points(geometry, material);
scene.add(galaxy);

/* ====== MEMORIAS ====== */
const memories = [
  { position:[2.2, 0.2, 1.0],  title:"Numero 1. 💫",      text:"Ya estoy un poco MUY harta de tanta cursilería verdaderamente.",          img:"una.jpeg" },
  { position:[-2.4,-0.1,-1.2], title:"Numero 2.🎂",                text:"Asi que bueno,  espero que se sienta muy feliz señorito por cada NO cumpleaños que ha tenido.😭💜",          img:"unaaa.jpeg" },
  { position:[1.0, 0.1,-2.5],  title:"Numero 3.✨",     text:" Espero que disfrute los que le faltan, que ya no son tantos la verdad.",                img:"otra.jpeg" },
  { position:[-1.8, 0.3, 2.0], title:"Numero 4.💖",               text:"Un pequeño recordatorio: Eres mi para siempre favorito. 💘🌷",         img:"otraa.jpeg" },
  { position:[2.8,-0.2,-0.8],  title:"Y el byecito.💌",         text:"Y pues bueno, ya eso es todo por hoy, byecito. 💕",         img:"unaa.jpeg" }
];

/* Crea una textura de respaldo (rosa con emoji) si la imagen no carga */
function fallbackTexture(emoji='💖'){
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,256,256);
  grad.addColorStop(0,'#ff90ff');
  grad.addColorStop(1,'#4f8cff');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,256,256);
  ctx.font = '140px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 128, 140);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const textureLoader = new THREE.TextureLoader();
const spheres = [];
const PHOTO_SIZE = 0.55;

memories.forEach((mem, idx) => {
  // Grupo contenedor (para el halo + foto + marco)
  const group = new THREE.Group();
  group.position.set(...mem.position);

  // Halo exterior brillante
  const haloGeo = new THREE.PlaneGeometry(PHOTO_SIZE*1.8, PHOTO_SIZE*1.8);
  const haloMat = new THREE.MeshBasicMaterial({
    color: 0xff90ff,
    transparent: true,
    opacity: 0.55,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    map: fallbackHalo()
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  group.add(halo);

  // Marco blanco detrás de la foto
  const frameGeo = new THREE.PlaneGeometry(PHOTO_SIZE*1.15, PHOTO_SIZE*1.15);
  const frameMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent:true, opacity:0.95 });
  const frame = new THREE.Mesh(frameGeo, frameMat);
  frame.position.z = 0.001;
  group.add(frame);

  // Plano con la foto
  const photoGeo = new THREE.PlaneGeometry(PHOTO_SIZE, PHOTO_SIZE);
  const photoMat = new THREE.MeshBasicMaterial({
    map: fallbackTexture(['🧸','🌸','🎂','💌','🌹'][idx % 5]),
    transparent: true
  });
  const photo = new THREE.Mesh(photoGeo, photoMat);
  photo.position.z = 0.002;
  group.add(photo);

  // Cargar la imagen real (si existe)
  textureLoader.load(
    mem.img,
    (tex) => {
      tex.colorSpace = THREE.SRGBColorSpace;
      photoMat.map = tex;
      photoMat.needsUpdate = true;
    },
    undefined,
    () => { /* error: nos quedamos con el fallback */ }
  );

  group.userData = { ...mem, opened:false, halo, photo, frame };
  scene.add(group);
  spheres.push(group);
});

function fallbackHalo(){
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128,128,20,128,128,128);
  g.addColorStop(0,'rgba(255,144,255,1)');
  g.addColorStop(0.4,'rgba(255,105,180,0.6)');
  g.addColorStop(1,'rgba(255,105,180,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);
}

/* ====== CÁMARA ====== */
const sizes = { width: innerWidth, height: innerHeight };
const camera = new THREE.PerspectiveCamera(75, sizes.width/sizes.height, 0.1, 100);
camera.position.set(4, 3, 5);
scene.add(camera);

/* ====== CONTROLES ====== */
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.minDistance = 2;
controls.maxDistance = 15;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;

/* ====== RENDER ====== */
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setSize(sizes.width, sizes.height);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000010, 1);

addEventListener('resize', ()=>{
  sizes.width = innerWidth; sizes.height = innerHeight;
  camera.aspect = sizes.width/sizes.height;
  camera.updateProjectionMatrix();
  renderer.setSize(sizes.width, sizes.height);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
});

/* ====== RAYCASTER ====== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let opened = new Set();

canvas.addEventListener('click', (event)=>{
  mouse.x = (event.clientX / innerWidth)*2 - 1;
  mouse.y = -(event.clientY / innerHeight)*2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(spheres, true);
  if(intersects.length > 0){
    // Buscar el grupo padre
    let target = intersects[0].object;
    while(target.parent && !target.userData.title) target = target.parent;
    if(!target.userData.title) return;

    openCard(target.userData);
    target.userData.opened = true;
    target.userData.halo.material.color.setHex(0x4f8cff);
    opened.add(target.userData.title);

    if(opened.size === memories.length){
      setTimeout(()=>{
        closeCard();
        const fm = document.getElementById('finalMsg');
        fm.textContent = '✨ Te amo infinito muchachito... Byecito. ';
        fm.classList.add('show');
        setTimeout(()=>{ window.location.href = 'index.html'; }, 4500);
      }, 3500);
    }
  }
});

function openCard(mem){
  document.getElementById("title-card").innerText = mem.title;
  document.getElementById("text").innerText = mem.text;
  const imgEl = document.getElementById("img");
  imgEl.onerror = () => { imgEl.style.display='none'; };
  imgEl.style.display = 'block';
  imgEl.src = mem.img;
  document.getElementById("card").classList.add("active");
}
window.closeCard = function(){
  document.getElementById("card").classList.remove("active");
}

/* ====== CORAZONES AL CLICK (fondo) ====== */
addEventListener('click', (e)=>{
  if(e.target.closest('#card')) return;
  const hearts = ['💖','💕','💗','✨','🌸'];
  for (let i = 0; i < 5; i++) {
    const h = document.createElement('div');
    h.className = 'floating-heart';
    h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left = (e.clientX + (Math.random()-0.5)*60) + 'px';
    h.style.top = e.clientY + 'px';
    h.style.fontSize = (1 + Math.random()*1.2) + 'rem';
    h.style.animationDuration = (2 + Math.random()*2) + 's';
    h.style.position = 'fixed';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }
});

/* ====== ANIMACIÓN ====== */
const clock = new THREE.Clock();
function animate(){
  const t = clock.getElapsedTime();
  galaxy.rotation.y = t * 0.05;
  bgStars.rotation.y = t * 0.01;

  spheres.forEach((s, i)=>{
    const pulse = 1 + Math.sin(t*2 + i)*0.12;
    s.scale.setScalar(pulse);
    // Billboard: que las fotos siempre miren a la cámara
    s.lookAt(camera.position);
  });

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
