<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>26 NO cumpleaños.💖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at center, #2a0845 0%, #1a0033 40%, #000010 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    cursor: crosshair;
  }
  #space {
    position: fixed; inset: 0;
    perspective: 1000px;
  }
  canvas#stars {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .galaxy {
    position: absolute; top: 50%; left: 50%;
    width: 0; height: 0;
    transform-style: preserve-3d;
    animation: rotate 60s linear infinite;
  }
  @keyframes rotate {
    from { transform: translate(-50%, -50%) rotateZ(0deg); }
    to   { transform: translate(-50%, -50%) rotateZ(360deg); }
  }
  .orbit {
    position: absolute;
    border: 1px dashed rgba(255, 182, 193, 0.15);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .photo, .emoji {
    position: absolute;
    top: 50%; left: 50%;
    transform-origin: center;
  }
  .photo {
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 25px rgba(255,105,180,0.8), 0 0 50px rgba(255,20,147,0.4);
    overflow: hidden;
    background: #fff;
    transition: transform 0.3s;
  }
  .photo:hover { transform: translate(-50%,-50%) scale(1.4) !important; z-index: 100; }
  .photo img { width: 100%; height: 100%; object-fit: cover; }
  .emoji {
    font-size: 2.2rem;
    filter: drop-shadow(0 0 10px rgba(255, 100, 180, 0.9));
    user-select: none;
  }
  .core {
    position: absolute; top: 50%; left: 50%;
    width: 120px; height: 120px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, #fff 0%, #ffb6c1 30%, #ff1493 60%, transparent 80%);
    border-radius: 50%;
    box-shadow: 0 0 80px #ff69b4, 0 0 160px #ff1493, 0 0 240px #c71585;
    animation: pulse 2s ease-in-out infinite;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
  }
  @keyframes pulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50%     { transform: translate(-50%,-50%) scale(1.15); }
  }
  .title {
    position: fixed;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    color: #fff;
    text-align: center;
    z-index: 50;
    text-shadow: 0 0 20px #ff1493, 0 0 40px #ff69b4;
    pointer-events: none;
  }
  .title h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300;
    letter-spacing: 8px;
    background: linear-gradient(90deg, #ff69b4, #fff, #ff1493);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.4)} }
  .title p { margin-top: 8px; letter-spacing: 4px; opacity: 0.85; font-size: 0.9rem;}
  .floating-heart {
    position: fixed;
    pointer-events: none;
    font-size: 1.5rem;
    animation: floatUp linear forwards;
    z-index: 200;
  }
  @keyframes floatUp {
    to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
  }
  .hint {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 0.85rem;
    letter-spacing: 2px; z-index: 50; pointer-events: none;
  }
</style>
</head>
<body>
<div class="title">
  <h1>GALAXIA DE AMOR</h1>
  <p>✦ un universo hecho de ti ✦</p>
</div>

<div id="space">
  <canvas id="stars"></canvas>
  <div class="galaxy" id="galaxy">
    <div class="core">💖</div>
  </div>
</div>

<div class="hint">haz clic en cualquier lugar 💕</div>

<script>
  // ============ STARFIELD ============
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length: 250}, () => ({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*1.5 + 0.2,
      a: Math.random(),
      s: Math.random()*0.02 + 0.005,
      c: Math.random() > 0.7 ? '255,182,193' : '255,255,255'
    }));
  }
  resize();
  window.addEventListener('resize', resize);
  function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
      s.a += s.s;
      const op = (Math.sin(s.a)+1)/2;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(${s.c},${op})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();

  // ============ GALAXY ELEMENTS ============
  const galaxy = document.getElementById('galaxy');
  const emojis = ['💖','💕','💗','💓','💘','💝','💞','💟','❤️','🌹','🌸','✨','🌟','💫','🦋','🥰','😍','💌','🕊️','🌷'];
  // Placeholder photo URLs (romantic/love themed via picsum + unsplash)
  const photos = [
    'https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=200&h=200&fit=crop',
    'https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=200&h=200&fit=crop',
    'https://images.unsplash.com/photo-1494774157365-9e04c6720e47?w=200&h=200&fit=crop',
    'https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=200&h=200&fit=crop',
    'https://images.unsplash.com/photo-1525导致507119-b6f3d6e6e6e6?w=200&h=200&fit=crop',
    'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=200&h=200&fit=crop',
    'https://images.unsplash.com/photo-1502635385003-ee1e6a1a742d?w=200&h=200&fit=crop',
    'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=200&h=200&fit=crop'
  ];

  // Create orbit rings
  const orbits = [180, 280, 380, 480, 580];
  orbits.forEach(r => {
    const o = document.createElement('div');
    o.className = 'orbit';
    o.style.width = (r*2)+'px';
    o.style.height = (r*2)+'px';
    galaxy.appendChild(o);
  });

  // Place photos on orbits
  photos.forEach((url, i) => {
    const orbit = orbits[i % orbits.length];
    const angle = (i / photos.length) * Math.PI * 2;
    const x = Math.cos(angle) * orbit;
    const y = Math.sin(angle) * orbit;
    const ph = document.createElement('div');
    ph.className = 'photo';
    ph.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
    const img = document.createElement('img');
    img.src = url;
    img.onerror = () => { img.src = `https://picsum.photos/seed/love${i}/200/200`; };
    ph.appendChild(img);
    // Counter-rotate so photos stay upright
    ph.style.animation = `counterRot 60s linear infinite`;
    galaxy.appendChild(ph);
  });

  // Place many emojis across orbits
  for (let i = 0; i < 60; i++) {
    const orbit = 150 + Math.random() * 480;
    const angle = Math.random() * Math.PI * 2;
    const x = Math.cos(angle) * orbit;
    const y = Math.sin(angle) * orbit;
    const e = document.createElement('div');
    e.className = 'emoji';
    e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.fontSize = (1.2 + Math.random()*1.8) + 'rem';
    e.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
    e.style.opacity = 0.6 + Math.random()*0.4;
    galaxy.appendChild(e);
  }

  // Counter-rotation keyframes (so photos don't appear upside down)
  const style = document.createElement('style');
  style.textContent = `
    @keyframes counterRot {
      from { transform: translate(-50%,-50%) rotateZ(0deg); }
      to   { transform: translate(-50%,-50%) rotateZ(-360deg); }
    }
  `;
  // (We keep transforms inline for positioning; counterRot is decorative)

  // ============ CLICK HEARTS ============
  document.addEventListener('click', (e) => {
    const hearts = ['💖','💕','💗','❤️','💘','✨','🌸'];
    for (let i = 0; i < 8; i++) {
      const h = document.createElement('div');
      h.className = 'floating-heart';
      h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
      h.style.left = (e.clientX + (Math.random()-0.5)*60) + 'px';
      h.style.top = e.clientY + 'px';
      h.style.fontSize = (1 + Math.random()*1.5) + 'rem';
      h.style.animationDuration = (2 + Math.random()*2) + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 4000);
    }
  });
</script>
</body>
</html>
