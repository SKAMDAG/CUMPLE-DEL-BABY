
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>23 NO Cumpleaños 💖</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #ffd1dc, #c1d3ff);
  font-family:'Poppins', sans-serif;
  overflow:hidden;
}

/* CONTENEDOR */
.container{
  position: relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CASSETTE */
.foto1{
  width:260px;
  height:260px;
  object-fit:cover;
  border-radius:22px;
  cursor:pointer;
  transition:0.4s;
  position: relative;
  z-index: 10;
}

.foto1.active{
  transform:scale(1.05);
}

/* CARTA (sale desde dentro) */
.carta{
  position: absolute;
  top: 0;
  left: 0;

  width:260px;
  height:260px;
  object-fit:cover;
  border-radius:22px;
  cursor:pointer;

  opacity:0;
  transform: translate(0,0) scale(0.9);
  transition: 0.7s cubic-bezier(.68,-0.55,.27,1.55);

  z-index:5;
}

.carta.show{
  opacity:1;
  transform: translate(80px, -60px) scale(1);
}

/* 📱 RESPONSIVE */
@media (max-width:768px){

  body{
    padding:20px;
  }

  .foto1{
    width:260px;
    height:260px;
    object-fit:contain;
  }

  .carta{
    width:200px;
    height:200px;
  }

  .carta.show{
    transform: translate(90px, -80px) scale(1);
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- CASSETTE -->
  <img src="cassete.png" class="foto1" id="foto1">

  <!-- CARTA -->
  <img src="nube.gif" class="carta" id="carta">

</div>

<!-- AUDIO -->
<audio id="audio" preload="auto" playsinline>
  <source src="Rauw Alejandro - Algo Mágico.mp3" type="audio/mpeg">
</audio>

<script>
const foto1 = document.getElementById("foto1");
const carta = document.getElementById("carta");
const audio = document.getElementById("audio");

/* CLICK CASSETTE */
foto1.addEventListener("click", (e) => {

  e.preventDefault();
  e.stopPropagation();

  audio.currentTime = 0;

  audio.play().catch(()=>{});

  foto1.classList.add("active");
  carta.classList.add("show");

});

/* CLICK CARTA */
carta.addEventListener("click", (e) => {

  e.stopPropagation();

  window.location.href = "index.html";
});
</script>

</body>
</html>
