<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>💙</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(180deg,#cfe9ff,#eaf6ff);
  display:flex;
  justify-content:center;
}

.app-container{
  width:100%;
  max-width:420px;
  min-height:100vh;
  padding:20px 15px;
  position:relative;
}

.stars{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}

.star{
  position:absolute;
  top:-20px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{ transform:translateY(110vh) rotate(360deg); }
}

@keyframes blink{
  50%{opacity:0.3;}
}

h2{
  text-align:center;
  color:#1e3a8a;
}

.grid{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:15px;
}

.card{
  background: rgba(184,215,245,0.5);
  backdrop-filter: blur(10px);
  border-radius:18px;
  padding:18px 5px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:active{transform:scale(0.95);}

.active{
  background:#9dc4f7;
  color:white;
}

.locked{opacity:0.5;}

.icon{font-size:22px;}
.day{font-size:13px;font-weight:bold;}
.timer{font-size:10px;}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.3);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.mensaje{
  background: rgba(184,215,245,0.95);
  backdrop-filter: blur(10px);
  padding:20px 25px;
  border-radius:18px;
  text-align:center;
  color:#1e3a8a;
  max-width:85%;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

@media(min-width:900px){
  .app-container{max-width:900px;}
  .grid{grid-template-columns: repeat(5,1fr);}
}
</style>
</head>

/* 📅 CONFIG */
const totalDias=30;
const fechaInicio=new Date(2026,2,1);
fechaInicio.setHours(0,0,0,0);

const grid=document.getElementById("grid");

/* 💬 popup */
function mostrarMensaje(dia){

  const d = mensajes[dia];

  const overlay=document.createElement("div");
  overlay.className="overlay";

  const msg=document.createElement("div");
  msg.className="mensaje";

  msg.innerHTML=`
    <div style="font-size:16px;font-weight:bold;margin-bottom:5px;">
      ${d?.titulo || "💙"}
    </div>

    <div style="font-size:13px;margin-bottom:10px;">
      ${d?.texto || ""}
    </div>

    🎵 
    <a href="${d?.link || '#'}" target="_blank"
    style="color:#1e3a8a;font-weight:bold;text-decoration:none;">
      ${d?.cancion || "Sorpresa 💖"}
    </a>
  `;

  overlay.appendChild(msg);
  document.body.appendChild(overlay);

  setTimeout(()=>{
    if(dia===30){
      window.location.href="cumpleanos.html";
    }
else if(dia===27){
  window.location.href="dia27.html";
}
    else{
      window.location.href="dia"+dia+".html";
    }
  },3000);
}

/* 🧠 tarjetas */
for(let i=1;i<=30;i++){

  const card=document.createElement("div");
  card.className="card";

  const fecha=new Date(fechaInicio);
  fecha.setDate(fechaInicio.getDate()+(i-1));

  const icon=document.createElement("div");
  const day=document.createElement("div");
  const timer=document.createElement("div");

  icon.className="icon";
  day.className="day";
  timer.className="timer";

  day.innerText="Día "+i;

  const now=new Date();

  if(now>=fecha){
    icon.innerText="🔓";
    timer.innerText="Disponible";
    card.classList.add("active");

    card.onclick=()=>mostrarMensaje(i);

  }else{
    icon.innerText="🔒";
    card.classList.add("locked");

    function update(){
      const diff=fecha-new Date();
      const d=Math.floor(diff/86400000);
      const h=Math.floor(diff/3600000)%24;
      const m=Math.floor(diff/60000)%60;
      const s=Math.floor(diff/1000)%60;
      timer.innerText=`${d}d ${h}h ${m}m ${s}s`;
    }

    update();
    setInterval(update,1000);
  }

  card.appendChild(icon);
  card.appendChild(day);
  card.appendChild(timer);

  grid.appendChild(card);
}
